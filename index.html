<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitica Sorter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl p-6">
        
        <!-- Setup Area -->
        <div id="setupArea" class="hidden mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl">
            <h2 class="font-bold text-blue-700 mb-2">API Settings</h2>
            <input type="text" id="uidInput" placeholder="User ID" class="w-full mb-2 p-2 border rounded">
            <input type="password" id="tokenInput" placeholder="API Token" class="w-full mb-4 p-2 border rounded">
            <div class="flex gap-2">
                <button onclick="saveKeys()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm">Save & Close</button>
                <button onclick="hideSetup()" class="text-gray-500 text-sm">Cancel</button>
            </div>
        </div>

        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold">Habitica To-Do Sorter</h1>
            <div class="mt-2 text-xs flex justify-center gap-4">
                <button onclick="showSetup()" class="text-blue-500 hover:underline">Edit Keys</button>
                <button onclick="clearAll()" class="text-red-500 hover:underline">Reset App</button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button id="fetchBtn" onclick="runFetch()" class="bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 active:scale-95 transition">1. Fetch & Sort</button>
            <button id="saveBtn" onclick="runSave()" disabled class="bg-blue-600 text-white py-3 rounded-lg font-bold opacity-50 hover:bg-blue-700 active:scale-95 transition">2. Save to Habitica</button>
        </div>

        <div id="msg" class="text-center text-sm text-gray-500 mb-4">Ready.</div>
        
        <!-- Output -->
        <div id="output" class="hidden">
            <div id="headerDisplay" class="p-3 bg-gray-50 border-l-4 border-blue-400 mb-4 font-bold text-blue-800"></div>
            <div id="list" class="border rounded divide-y"></div>
        </div>

        <div id="err" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded text-sm"></div>
    </div>

    <script>
        // --- DATA INJECTION ---
        const API_URL = "https://habitica.com/api/v3/tasks/user";
        const PREFIX = "Sorted To-Dos for";
        const BAD_CHARS = ['%', '&', '$', '/'];
        const G_DAYS = ['Δευ', 'Τρι', 'Τετ', 'Πεμ', 'Παρ', 'Σαβ', 'Κυρ'];
        const G_MONTHS = ['Ιαν', 'Φεβ', 'Μαρ', 'Απρ', 'Μαϊ', 'Ιου', 'Ιου', 'Αυγ', 'Σεπ', 'Οκτ', 'Νοε', 'Δεκ'];

        let globalText = ""; 
        let globalDate = "";

        // UI Toggle Functions
        function showSetup() { document.getElementById('setupArea').classList.remove('hidden'); }
        function hideSetup() { document.getElementById('setupArea').classList.add('hidden'); }
        
        function clearAll() { 
            if(confirm("Wipe keys?")) { localStorage.clear(); location.reload(); }
        }

        function localStorageAvailable() {
            try {
                const testKey = '__habitica_test__';
                localStorage.setItem(testKey, testKey);
                localStorage.removeItem(testKey);
                return true;
            } catch (e) {
                return false;
            }
        }

        function saveKeys() {
            const u = document.getElementById('uidInput').value.trim();
            const t = document.getElementById('tokenInput').value.trim();
            const err = document.getElementById('err');
            err.classList.add('hidden');

            if(!u || !t) {
                err.innerText = 'Enter both User ID and API Token before saving.';
                err.classList.remove('hidden');
                return;
            }

            if(!localStorageAvailable()) {
                err.innerText = 'Local storage is unavailable in this browser. Keys cannot be saved.';
                err.classList.remove('hidden');
                return;
            }

            try {
                localStorage.setItem('habitica_uid', u);
                localStorage.setItem('habitica_token', t);
                hideSetup();
                location.reload();
            } catch (e) {
                err.innerText = 'Unable to save keys: ' + e.message;
                err.classList.remove('hidden');
            }
        }

        window.onload = () => {
            if(!localStorageAvailable()) {
                document.getElementById('err').innerText = 'Local storage is unavailable in this browser. The app cannot save keys.';
                document.getElementById('err').classList.remove('hidden');
                showSetup();
                return;
            }

            const uid = localStorage.getItem('habitica_uid');
            const token = localStorage.getItem('habitica_token');
            if(uid) document.getElementById('uidInput').value = uid;
            if(token) document.getElementById('tokenInput').value = token;
            if(!uid || !token) showSetup();
        };

        // Date Logic
        function getGDate(skip) {
            const d = new Date();
            let f = new Date(d);
            if (typeof skip === 'number') f.setDate(d.getDate() + skip);
            else if (skip === 'Monday') f.setDate(d.getDate() + ((1 - d.getDay() + 7) % 7 || 7));
            else f.setDate(d.getDate() + 1);

            const day = G_DAYS[f.getDay() === 0 ? 6 : f.getDay() - 1];
            const mon = G_MONTHS[f.getMonth()];
            const s = `${day} ${f.getDate()} ${mon}`;
            return { h: `Για αυριο ${s}`, s: s };
        }

        // Main Logic
        async function runFetch() {
            const u = localStorage.getItem('habitica_uid');
            const t = localStorage.getItem('habitica_token');
            if(!u || !t) return showSetup();

            const msg = document.getElementById('msg');
            msg.innerText = "Fetching...";
            
            try {
                const res = await fetch(API_URL, { headers: { "x-api-user": u, "x-api-key": t } });
                const data = await res.json();
                if(!data.success) throw new Error(data.message);

                let filtered = [];
                let skip = 1;
                let mon = false;

                data.data.forEach(task => {
                    if(task.type !== 'todo') return;
                    const txt = task.text.trim();
                    if(txt.startsWith("!^!")) {
                        const n = txt.match(/\d+/);
                        n ? skip = Math.max(skip, parseInt(n[0])) : mon = true;
                    } else if (!txt.startsWith(PREFIX) && !BAD_CHARS.includes(txt[0])) {
                        filtered.push(task);
                    }
                });

                if(mon && skip === 1) skip = 'Monday';
                filtered.sort((a,b) => {
                    const aE = (a.text.match(/!/g) || []).length;
                    const bE = (b.text.match(/!/g) || []).length;
                    return (aE !== bE) ? bE - aE : b.text.length - a.text.length;
                });

                const dateObj = getGDate(skip);
                globalDate = dateObj.s;
                globalText = [dateObj.h, "", ...filtered.map(x => x.text)].join("\n");

                document.getElementById('headerDisplay').innerText = dateObj.h;
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = filtered.map(x => `<div class="p-3 text-sm">${x.text}</div>`).join("");
                
                document.getElementById('output').classList.remove('hidden');
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').classList.remove('opacity-50');
                msg.innerText = "Fetch complete.";
            } catch (e) {
                document.getElementById('err').innerText = e.message;
                document.getElementById('err').classList.remove('hidden');
            }
        }

        async function runSave() {
            const u = localStorage.getItem('habitica_uid');
            const t = localStorage.getItem('habitica_token');
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "x-api-user": u, "x-api-key": t, "Content-Type": "application/json" },
                    body: JSON.stringify({ text: `Sorted To-Dos for ${globalDate}`, notes: globalText, type: 'todo' })
                });
                if(res.ok) alert("Saved successfully!");
            } catch (e) { alert(e.message); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
